<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Waste System</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>SMART WASTE IOT SYSTEM</h1>
    <p>Monitoreo · Optimización · Analítica en Tiempo Real</p>
</header>

<main class="dashboard">

    <!-- CONTENEDORES -->
    <section class="panel">
        <h2>Contenedores</h2>
        <div id="contenedores" class="grid"></div>
    </section>

    <!-- RUTA -->
    <section class="panel">
        <h2>Ruta Óptima</h2>
        <div class="map" id="mapa"></div>
    </section>

    <!-- METRICAS -->
    <section class="panel">
        <h2>Métricas Operativas</h2>
        <div class="stats">
            <div class="stat" id="tiempo"></div>
            <div class="stat" id="combustible"></div>
            <div class="stat" id="eficiencia"></div>
            <div class="stat" id="distancia"></div>
            <div class="stat" id="trafico"></div>
        </div>
    </section>

    <!-- SISTEMA -->
    <section class="panel">
        <h2>Sistema IoT</h2>
        <div class="grid small">
            <div class="box">Sensores</div>
            <div class="box">Gateway</div>
            <div class="box">Cloud</div>
            <div class="box">Big Data</div>
            <div class="box">IA</div>
            <div class="box">App Web</div>
        </div>
    </section>

    <!-- LOG -->
    <section class="panel">
        <h2>Eventos del Sistema</h2>
        <div id="log" class="log"></div>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
